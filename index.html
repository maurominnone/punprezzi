  .mini-card .time{font-family:'Space Mono',monospace; font-size:19px; font-weight:700;}

  .zone-select{

    padding:8px 10px; border-radius:10px; font-size:12.5px; font-family:'Inter',sans-serif;

  .state-msg{

  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="eyebrow"><span class="live-dot"></span> PREZZO ELETTRICITÀ · ORA ATTUALE</div>

  <div id="heroCard" class="hero">
    <div class="skeleton" style="height:90px;"></div>
  </div>

  <div id="dayTabs" class="day-tabs"></div>
  <div id="chartCard" class="chart-card">
    <div class="skeleton" style="height:150px;"></div>
  </div>
  <div id="tapInfo" style="text-align:center; font-family:'Space Mono',monospace; font-size:12.5px; color:var(--muted); margin-top:8px; min-height:16px;">tocca una barra per vedere ora e prezzo esatti</div>

  <div id="cards" class="cards"></div>

  <div class="footer">
    <select id="zoneSelect" class="zone-select">
      <option value="IT-North">Zona Nord</option>
      <option value="IT-Centre-North">Zona Centro-Nord</option>
      <option value="IT-Centre-South">Zona Centro-Sud</option>
      <option value="IT-South">Zona Sud</option>
      <option value="IT-Calabria">Zona Calabria</option>
      <option value="IT-Sicily">Zona Sicilia</option>
      <option value="IT-Sardinia">Zona Sardegna</option>
    </select>
    <div id="meta">—</div>
    <button class="refresh-btn" id="refreshBtn">↻ Aggiorna prezzi</button>
  </div>

</div>

<script>
const ZONE_LABELS = {
  'IT-North': 'Zona Nord',
  'IT-Centre-North': 'Zona Centro-Nord',
  'IT-Centre-South': 'Zona Centro-Sud',
  'IT-South': 'Zona Sud',
  'IT-Calabria': 'Zona Calabria',
  'IT-Sicily': 'Zona Sicilia',
  'IT-Sardinia': 'Zona Sardegna',
};
let ZONE = localStorage.getItem('pun_zone') || 'IT-North';
let refreshTimer = null;

const heroCard = document.getElementById('heroCard');
const chartCard = document.getElementById('chartCard');
const cardsEl = document.getElementById('cards');
const metaEl = document.getElementById('meta');
const refreshBtn = document.getElementById('refreshBtn');
const zoneSelect = document.getElementById('zoneSelect');
zoneSelect.value = ZONE;

function fmtEUR(v, decimals){ return v.toLocaleString('it-IT', {minimumFractionDigits:decimals, maximumFractionDigits:decimals}); }
function pad(n){ return n.toString().padStart(2,'0'); }
function hourLabel(d){ return pad(d.getHours()) + ':00'; }

const GIORNI = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
const GIORNI_BREVI = ['dom','lun','mar','mer','gio','ven','sab'];
const MESI = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

function dayTag(d, now){
  if(sameDay(d, now)) return 'oggi';
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
  if(sameDay(d, tomorrow)) return 'domani';
  return GIORNI_BREVI[d.getDay()] + ' ' + pad(d.getDate()) + '/' + pad(d.getMonth()+1);
}

function fullDateLabel(d, now){
  const tag = dayTag(d, now);
  if(tag === 'oggi' || tag === 'domani'){
    const cap = tag.charAt(0).toUpperCase() + tag.slice(1);
    return `${cap}, ${GIORNI[d.getDay()]} ${d.getDate()} ${MESI[d.getMonth()]}`;
  }
  return `${GIORNI[d.getDay()].charAt(0).toUpperCase() + GIORNI[d.getDay()].slice(1)} ${d.getDate()} ${MESI[d.getMonth()]}`;
}

async function fetchZone(zone){
  const now = new Date();
  const start = new Date(now); start.setUTCDate(start.getUTCDate() - 1);
  const end = new Date(now); end.setUTCDate(end.getUTCDate() + 2);
  const s = start.toISOString().slice(0,10);
  const e = end.toISOString().slice(0,10);
  const url = `https://api.energy-charts.info/price?bzn=${zone}&start=${s}&end=${e}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if(!json.unix_seconds || !json.price || json.unix_seconds.length === 0){
    throw new Error('Nessun dato disponibile');
  }
  return json;
}

function aggregateHourly(json){
  // group quarter-hour or hourly points into hourly averages, keyed by hour timestamp
  const buckets = new Map();
  for(let i=0;i<json.unix_seconds.length;i++){
    const price = json.price[i];
    if(price === null || price === undefined) continue;
    const d = new Date(json.unix_seconds[i]*1000);
    const hourKey = new Date(d.getFullYear(), d.getMonth(), d.getDate(), d.getHours()).getTime();
    if(!buckets.has(hourKey)) buckets.set(hourKey, []);
    buckets.get(hourKey).push(price);
  }
  const rows = [];
  for(const [key, arr] of buckets.entries()){
    const avg = arr.reduce((a,b)=>a+b,0)/arr.length;
    rows.push({ time: new Date(key), priceMWh: avg });
  }
  rows.sort((a,b)=>a.time - b.time);
  return rows;
}

function classify(price, min, max){
  if(max === min) return 'mid';
  const pct = (price - min) / (max - min);
  if(pct <= 0.33) return 'cheap';
  if(pct >= 0.66) return 'expensive';
  return 'mid';
}

function colorFor(cls){
  if(cls === 'cheap') return getComputedStyle(document.documentElement).getPropertyValue('--cheap').trim();
  if(cls === 'expensive') return getComputedStyle(document.documentElement).getPropertyValue('--expensive').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--mid').trim();
}

function labelFor(cls){
  if(cls === 'cheap') return 'Conveniente';
  if(cls === 'expensive') return 'Cara';
  return 'Nella media';
}

function render(rows, zoneLabel, staleSince, cachedAt){
  const now = new Date();
  const currentHourKey = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()).getTime();

  // Giorno corrente completo (per il grafico/confronto) + ore rimanenti (per i consigli pratici)
  const dayRows = rows.filter(r => sameDay(r.time, now));
  if(dayRows.length === 0) throw new Error('Nessun dato disponibile per oggi');

  let currentIndex = dayRows.findIndex(r => r.time.getTime() === currentHourKey);
  if(currentIndex === -1){
    currentIndex = dayRows.findIndex(r => r.time.getTime() >= currentHourKey);
    if(currentIndex === -1) currentIndex = dayRows.length - 1;
  }
  const nowRow = dayRows[currentIndex];
  const remaining = dayRows.slice(currentIndex);

  // min/max sull'intera giornata: così i colori riflettono il confronto passato/futuro richiesto
  const dayPrices = dayRows.map(r => r.priceMWh);
  const min = Math.min(...dayPrices), max = Math.max(...dayPrices);

  const nowCls = classify(nowRow.priceMWh, min, max);
  const nowKwh = nowRow.priceMWh / 1000;

  // hero
  heroCard.innerHTML = `
    <div class="hero-top">
      <div>
        <div class="hour-label">${fullDateLabel(now, now)} · ${hourLabel(nowRow.time)} – ${hourLabel(new Date(nowRow.time.getTime()+3600000))}</div>
        <div class="price-main">${fmtEUR(nowKwh,3)}<sup>€/kWh</sup></div>
        <div class="price-sub">${fmtEUR(nowRow.priceMWh,1)} €/MWh</div>
      </div>
    </div>
    <span class="pill ${nowCls}"><span class="dot" style="background:${colorFor(nowCls)}"></span>${labelFor(nowCls)} rispetto a tutta la giornata</span>
    <div class="advice" id="adviceText"></div>
  `;

  // ore rimanenti da adesso a fine giornata: usate per il consiglio pratico (non ha senso consigliare un'ora già passata)
  let cheapestUpcoming = remaining[0], costliestUpcoming = remaining[0];
  for(const r of remaining){
    if(r.priceMWh < cheapestUpcoming.priceMWh) cheapestUpcoming = r;
    if(r.priceMWh > costliestUpcoming.priceMWh) costliestUpcoming = r;
  }
  const savingPct = costliestUpcoming.priceMWh > 0 ? Math.round((1 - cheapestUpcoming.priceMWh/costliestUpcoming.priceMWh)*100) : 0;

  document.getElementById('adviceText').innerHTML =
    nowCls === 'cheap'
      ? `È un buon momento per far partire elettrodomestici a consumo flessibile (lavatrice, lavastoviglie, ricarica). L'ora più cara rimasta oggi costerà circa <b>${savingPct}% in più</b>.`
      : nowCls === 'expensive'
      ? `Se puoi, rimanda i consumi flessibili: l'ora più conveniente rimasta oggi sarà alle <b>${hourLabel(cheapestUpcoming.time)}</b>, circa <b>${savingPct}% più economica</b> di adesso.`
      : `Prezzo nella media. Per risparmiare di più, l'ora più conveniente rimasta oggi è alle <b>${hourLabel(cheapestUpcoming.time)}</b>.`;

  // chart + cards: gestiti da renderDayView, richiamabile anche al cambio tab senza rifare la rete
  window._punRows = rows;
  window._punNow = now;
  renderDayTabs(rows, now);
  renderDayView(rows, now, window._punView || 'today');

  metaEl.textContent = staleSince
    ? `${zoneLabel} · ⚠️ dati salvati delle ${pad(new Date(staleSince).getHours())}:${pad(new Date(staleSince).getMinutes())} (server irraggiungibile ora)`
    : cachedAt
    ? `${zoneLabel} · dati di oggi (scaricati alle ${pad(new Date(cachedAt).getHours())}:${pad(new Date(cachedAt).getMinutes())})`
    : `${zoneLabel} · aggiornato alle ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

function renderDayTabs(rows, now){
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
  const hasTomorrow = rows.some(r => sameDay(r.time, tomorrow));
  const view = window._punView || 'today';
  const dayTabs = document.getElementById('dayTabs');
  dayTabs.innerHTML = `
    <div class="day-tab ${view === 'today' ? 'active' : ''}" data-view="today">Oggi</div>
    <div class="day-tab ${view === 'tomorrow' ? 'active' : ''}" data-view="tomorrow">Domani <span class="badge ${hasTomorrow ? '' : 'unavailable'}">${hasTomorrow ? 'disponibile' : 'non ancora'}</span></div>
  `;
  dayTabs.querySelectorAll('.day-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      window._punView = tab.dataset.view;
      renderDayTabs(window._punRows, window._punNow);
      renderDayView(window._punRows, window._punNow, window._punView);
    });
  });
}

function renderDayView(rows, now, view){
  const targetDate = view === 'tomorrow' ? (() => { const t = new Date(now); t.setDate(t.getDate()+1); return t; })() : now;
  const targetRows = rows.filter(r => sameDay(r.time, targetDate));
  const currentHourKey = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()).getTime();

  if(targetRows.length === 0){
    chartCard.innerHTML = `<div class="empty-tomorrow">📅 I prezzi di domani non sono ancora stati pubblicati.<br>Il GME li rilascia di solito nel primo pomeriggio (intorno alle 13:00) — ricontrolla più tardi con "↻ Aggiorna prezzi".</div>`;
    document.getElementById('tapInfo').textContent = '';
    cardsEl.innerHTML = '';
    return;
  }

  let currentIndex = view === 'today' ? targetRows.findIndex(r => r.time.getTime() === currentHourKey) : -1;
  if(view === 'today' && currentIndex === -1) currentIndex = targetRows.length - 1;

  const prices = targetRows.map(r => r.priceMWh);
  const min = Math.min(...prices), max = Math.max(...prices);

  const barsHtml = targetRows.map((r, i) => {
    const cls = classify(r.priceMWh, min, max);
    const heightPct = max === min ? 50 : 8 + (r.priceMWh - min) / (max - min) * 92;
    const isNow = i === currentIndex;
    const isPast = view === 'today' && i < currentIndex;
    return `<div class="bar-col ${isNow ? 'now' : ''} ${isPast ? 'past' : ''}" data-hour="${dayTag(r.time, now)} alle ${hourLabel(r.time)}${isPast ? ' (passata)' : ''}" data-price="${fmtEUR(r.priceMWh/1000,3)} €/kWh (${fmtEUR(r.priceMWh,1)} €/MWh)">
      ${isNow ? '<span class="now-flag"></span>' : ''}
      <div class="bar" style="height:${heightPct}%; background:${colorFor(cls)}${isNow ? '' : ';opacity:' + (isPast ? '.4' : '.85')}"></div>
    </div>`;
  }).join('');

  const KEY_HOURS = [6, 12, 18];
  const axisHtml = targetRows.map((r,i) => {
    const isNow = i === currentIndex;
    const showLabel = isNow || KEY_HOURS.includes(r.time.getHours());
    return `<span class="${isNow ? 'now-label' : ''}">${showLabel ? hourLabel(r.time) : ''}</span>`;
  }).join('');

  chartCard.innerHTML = `<div class="chart">${barsHtml}</div><div class="axis">${axisHtml}</div>`;

  const tapInfo = document.getElementById('tapInfo');
  tapInfo.textContent = 'tocca una barra per vedere ora e prezzo esatti';
  chartCard.querySelectorAll('.bar-col').forEach(col => {
    col.addEventListener('click', () => {
      chartCard.querySelectorAll('.bar-col').forEach(c => c.classList.remove('selected'));
      col.classList.add('selected');
      tapInfo.innerHTML = `<b style="color:var(--text)">${col.dataset.hour}</b> · ${col.dataset.price}`;
    });
  });

  let cheapest = targetRows[0], costliest = targetRows[0];
  for(const r of targetRows){
    if(r.priceMWh < cheapest.priceMWh) cheapest = r;
    if(r.priceMWh > costliest.priceMWh) costliest = r;
  }
  const dayWord = view === 'tomorrow' ? 'domani' : 'oggi';
  cardsEl.innerHTML = `
    <div class="mini-card">
      <div class="label"><span class="dot" style="background:${colorFor('cheap')}"></span>Più conveniente ${dayWord}</div>
      <div class="time">${hourLabel(cheapest.time)}</div>
      <div class="val">${fmtEUR(cheapest.priceMWh/1000,3)} €/kWh</div>
    </div>
    <div class="mini-card">
      <div class="label"><span class="dot" style="background:${colorFor('expensive')}"></span>Più cara ${dayWord}</div>
      <div class="time">${hourLabel(costliest.time)}</div>
      <div class="val">${fmtEUR(costliest.priceMWh/1000,3)} €/kWh</div>
    </div>
  `;
}

function showError(message, debugLines){
  const details = (debugLines && debugLines.length)
    ? `<div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line); text-align:left; font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); white-space:pre-wrap; word-break:break-all;">${debugLines.map(l=>l.replace(/</g,'&lt;')).join('\n')}</div>`
    : '';
  heroCard.innerHTML = `<div class="state-msg">⚠️ Non riesco a scaricare i prezzi.<br><br><b style="color:var(--text)">${(message||'').replace(/</g,'&lt;')}</b><br><br>Puoi controllare i prezzi direttamente su <a href="https://www.mercatoelettrico.org" target="_blank" rel="noopener">mercatoelettrico.org</a>.${details}</div>`;
  chartCard.innerHTML = '';
  cardsEl.innerHTML = '';
  metaEl.textContent = '—';
}

function cacheHasTomorrow(cache, now){
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
  return cache.data.unix_seconds.some(ts => {
    const d = new Date(ts*1000);
    return sameDay(d, tomorrow);
  });
}

async function load(forceRefresh){
  const debugLines = [];
  const now = new Date();

  // 1) Prova prima la cache locale: se già abbiamo dati validi per oggi, evitiamo del tutto la rete
  if(!forceRefresh){
    const cachedRaw = localStorage.getItem('pun_cache_' + ZONE);
    if(cachedRaw){
      try{
        const cache = JSON.parse(cachedRaw);
        const savedDate = new Date(cache.savedAt);
        const savedSameDay = sameDay(savedDate, now);
        const gmeShouldHavePublishedTomorrow = now.getHours() >= 13;
        const alreadyHasTomorrow = cacheHasTomorrow(cache, now);
        const needsTomorrowFetch = gmeShouldHavePublishedTomorrow && !alreadyHasTomorrow && savedDate.getHours() < 13;

        if(savedSameDay && !needsTomorrowFetch){
          const rows = aggregateHourly(cache.data);
          render(rows, ZONE_LABELS[ZONE], null, cache.savedAt);
          return; // niente chiamata di rete: dati di oggi già in memoria
        }
      }catch(e){ /* cache corrotta, ignora e prosegui a scaricare */ }
    }
  }

  heroCard.innerHTML = `<div class="skeleton" style="height:90px;"></div>`;
  chartCard.innerHTML = `<div class="skeleton" style="height:150px;"></div>`;
  cardsEl.innerHTML = '';
  const s = (()=>{const d=new Date();d.setUTCDate(d.getUTCDate()-1);return d.toISOString().slice(0,10);})();
  const e = (()=>{const d=new Date();d.setUTCDate(d.getUTCDate()+2);return d.toISOString().slice(0,10);})();
  const realUrl = `https://api.energy-charts.info/price?bzn=${ZONE}&start=${s}&end=${e}`;

  const attempts = [
    { label: 'diretto', url: realUrl },
    { label: 'proxy codetabs', url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(realUrl) },
    { label: 'proxy corsfix', url: 'https://proxy.corsfix.com/?' + realUrl },
    { label: 'proxy thingproxy', url: 'https://thingproxy.freeboard.io/fetch/' + realUrl },
    { label: 'proxy allorigins-get', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(realUrl), wrapped: true },
    { label: 'proxy corsproxy.io', url: 'https://corsproxy.io/?url=' + encodeURIComponent(realUrl) },
    { label: 'proxy cors.lol', url: 'https://api.cors.lol/?url=' + encodeURIComponent(realUrl) },
    { label: 'proxy allorigins-raw', url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(realUrl) },
  ];

  let json = null;
  for(const attempt of attempts){
    try{
      debugLines.push('Tento (' + attempt.label + ')…');
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 14000);
      const res = await fetch(attempt.url, { signal: controller.signal });
      clearTimeout(timeoutId);
      if(!res.ok){
        debugLines.push(attempt.label + ' → HTTP ' + res.status);
        continue;
      }
      let parsed = await res.json();
      if(attempt.wrapped && parsed && typeof parsed.contents === 'string'){
        parsed = JSON.parse(parsed.contents);
      }
      if(!parsed.unix_seconds || !parsed.price || parsed.unix_seconds.length === 0){
        debugLines.push(attempt.label + ' → risposta vuota');
        continue;
      }
      json = parsed;
      debugLines.push(attempt.label + ' → OK, ' + parsed.unix_seconds.length + ' punti');
      break;
    }catch(err){
      debugLines.push(attempt.label + ' → ' + (err.name === 'AbortError' ? 'timeout' : err.message));
    }
  }

  try{
    if(!json){
      const cached = localStorage.getItem('pun_cache_' + ZONE);
      if(cached){
        const parsedCache = JSON.parse(cached);
        const rows = aggregateHourly(parsedCache.data);
        render(rows, ZONE_LABELS[ZONE], parsedCache.savedAt);
        debugLines.push('Uso dati salvati del ' + new Date(parsedCache.savedAt).toLocaleString('it-IT'));
        return;
      }
      throw new Error('Tutti i tentativi falliti e nessun dato salvato disponibile');
    }
    localStorage.setItem('pun_cache_' + ZONE, JSON.stringify({ data: json, savedAt: Date.now() }));
    const rows = aggregateHourly(json);
    render(rows, ZONE_LABELS[ZONE]);
  }catch(err){
    console.error(err);
    showError(err.message, debugLines);
  }
}

refreshBtn.addEventListener('click', () => load(true));
zoneSelect.addEventListener('change', () => {
  ZONE = zoneSelect.value;
  localStorage.setItem('pun_zone', ZONE);
  load();
});

load();
refreshTimer = setInterval(load, 15 * 60 * 1000); // ricontrolla ogni 15 min (quasi sempre da cache, zero chiamate)
</script>
</body>
</html>
