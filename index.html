<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prezzo energia · ora per ora</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prezzo Luce">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c1117">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c1117;--panel:#141b23;--panel-2:#1b2430;--line:#26313d;--text:#e9eef3;--muted:#8394a3;--cheap:#3fd6b0;--mid:#f0b429;--expensive:#ef5b6f;--cheap-dim:rgba(63,214,176,.16);--expensive-dim:rgba(239,91,111,.16)}*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:radial-gradient(circle at 50% -10%,#17202b 0%,var(--bg) 55%);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh;padding:18px 14px 40px;-webkit-font-smoothing:antialiased}.wrap{max-width:480px;margin:0 auto}.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}.live-dot{width:7px;height:7px;border-radius:50%;background:var(--cheap);box-shadow:0 0 0 0 rgba(63,214,176,.6);animation:pulse 2.2s infinite;flex:none}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,214,176,.55)}70%{box-shadow:0 0 0 8px rgba(63,214,176,0)}100%{box-shadow:0 0 0 0 rgba(63,214,176,0)}}.hero{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:20px;padding:22px 20px 20px;margin-bottom:14px}.hero-top{display:flex;justify-content:space-between;align-items:flex-start}.hour-label{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted)}.price-main{font-family:'Space Mono',monospace;font-weight:700;font-size:52px;line-height:1;margin:10px 0 2px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}.price-main sup{font-size:20px;font-weight:400;color:var(--muted);margin-left:4px}.price-sub{font-family:'Space Mono',monospace;font-size:14px;color:var(--muted);margin-bottom:14px}.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid transparent}.pill .dot{width:8px;height:8px;border-radius:50%}.pill.cheap{background:var(--cheap-dim);color:var(--cheap);border-color:rgba(63,214,176,.3)}.pill.mid{background:rgba(240,180,41,.14);color:var(--mid);border-color:rgba(240,180,41,.3)}.pill.expensive{background:var(--expensive-dim);color:var(--expensive);border-color:rgba(239,91,111,.3)}.advice{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-size:13.5px;color:#c3ccd4;line-height:1.5}.advice b{color:var(--text)}.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px 14px 10px}.chart{display:flex;align-items:flex-end;gap:3px;height:150px;padding:0 2px}.bar-col{flex:1 1 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative}.bar{width:100%;max-width:14px;border-radius:4px 4px 2px 2px;background:var(--mid);position:relative;transition:height .4s ease}.bar-col.now .bar{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--text)}.bar-col.selected .bar{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--cheap)}.bar-col.past .now-flag{display:none}.now-flag{position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--text);animation:blip 1.6s infinite}@keyframes blip{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:.3;transform:translateX(-50%) scale(1.6)}}.axis{display:flex;gap:3px;padding:8px 2px 0;margin-top:2px;border-top:1px solid var(--line)}.axis span{flex:1 1 0;text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);max-width:14px;white-space:nowrap;overflow:visible;position:relative;z-index:1;display:block}.axis span.now-label{color:var(--text);font-weight:700}.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.day-tabs{display:flex;gap:8px;margin:22px 2px 10px}.day-tab{flex:1;text-align:center;padding:9px 10px;border-radius:12px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:12.5px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}.day-tab.active{background:var(--panel-2);color:var(--text);border-color:var(--cheap)}.day-tab .badge{font-size:9px;padding:1px 5px;border-radius:999px;background:rgba(63,214,176,.18);color:var(--cheap)}.day-tab .badge.unavailable{background:rgba(131,148,163,.18);color:var(--muted)}.empty-tomorrow,.state-msg{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}.mini-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}.mini-card .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:6px}.mini-card .dot{width:8px;height:8px;border-radius:50%;flex:none}.mini-card .time{font-family:'Space Mono',monospace;font-size:19px;font-weight:700}.mini-card .val{font-family:'Space Mono',monospace;font-size:12.5px;color:var(--muted);margin-top:2px}.footer{margin-top:20px;display:flex;flex-direction:column;gap:10px;font-size:12px;color:var(--muted);text-align:center}.refresh-btn,.zone-select{background:var(--panel-2);border:1px solid var(--line);color:var(--text)}.refresh-btn{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;width:100%}.refresh-btn:active{transform:scale(.98)}.zone-select{padding:8px 10px;border-radius:10px;font-size:12.5px;font-family:'Inter',sans-serif;width:100%}.state-msg a{color:var(--cheap)}.skeleton{background:linear-gradient(90deg,var(--panel) 25%,var(--panel-2) 37%,var(--panel) 63%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:8px}@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow"><span class="live-dot"></span> PREZZO ELETTRICITÀ · ORA ATTUALE</div>
  <div id="heroCard" class="hero"><div class="skeleton" style="height:90px"></div></div>
  <div id="dayTabs" class="day-tabs"></div>
  <div id="chartCard" class="chart-card"><div class="skeleton" style="height:150px"></div></div>
  <div id="tapInfo" style="text-align:center;font-family:'Space Mono',monospace;font-size:12.5px;color:var(--muted);margin-top:8px;min-height:16px">tocca una barra per vedere ora e prezzo esatti</div>
  <div id="cards" class="cards"></div>
  <div class="footer">
    <select id="zoneSelect" class="zone-select">
      <option value="IT-North">Zona Nord</option>
      <option value="IT-Centre-North">Zona Centro-Nord</option>
      <option value="IT-Centre-South">Zona Centro-Sud</option>
      <option value="IT-South">Zona Sud</option>
      <option value="IT-Calabria">Zona Calabria</option>
      <option value="IT-Sicily">Zona Sicilia</option>
      <option value="IT-Sardinia">Zona Sardegna</option>
    </select>
    <div id="meta">—</div>
    <button class="refresh-btn" id="refreshBtn">↻ Ricarica dati salvati</button>
  </div>
</div>
<script>
const ZONE_LABELS={'IT-North':'Zona Nord','IT-Centre-North':'Zona Centro-Nord','IT-Centre-South':'Zona Centro-Sud','IT-South':'Zona Sud','IT-Calabria':'Zona Calabria','IT-Sicily':'Zona Sicilia','IT-Sardinia':'Zona Sardegna'};
let ZONE='IT-North';
try{ZONE=localStorage.getItem('pun_zone')||'IT-North'}catch(e){}
const heroCard=document.getElementById('heroCard');
const chartCard=document.getElementById('chartCard');
const cardsEl=document.getElementById('cards');
const metaEl=document.getElementById('meta');
const refreshBtn=document.getElementById('refreshBtn');
const zoneSelect=document.getElementById('zoneSelect');
zoneSelect.value=ZONE;
function fmtEUR(v,d){return v.toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d})}
function pad(n){return n.toString().padStart(2,'0')}
function hourLabel(d){return pad(d.getHours())+':00'}
const GIORNI=['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
const GIORNI_BREVI=['dom','lun','mar','mer','gio','ven','sab'];
const MESI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function dayTag(d,now){if(sameDay(d,now))return 'oggi';const t=new Date(now);t.setDate(t.getDate()+1);if(sameDay(d,t))return 'domani';return GIORNI_BREVI[d.getDay()]+' '+pad(d.getDate())+'/'+pad(d.getMonth()+1)}
function fullDateLabel(d,now){const tag=dayTag(d,now);if(tag==='oggi'||tag==='domani'){const cap=tag.charAt(0).toUpperCase()+tag.slice(1);return `${cap}, ${GIORNI[d.getDay()]} ${d.getDate()} ${MESI[d.getMonth()]}`}return `${GIORNI[d.getDay()].charAt(0).toUpperCase()+GIORNI[d.getDay()].slice(1)} ${d.getDate()} ${MESI[d.getMonth()]}`}
function aggregateHourly(json){const buckets=new Map();for(let i=0;i<json.unix_seconds.length;i++){const price=json.price[i];if(price===null||price===undefined)continue;const d=new Date(json.unix_seconds[i]*1000);const key=new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours()).getTime();if(!buckets.has(key))buckets.set(key,[]);buckets.get(key).push(price)}const rows=[];for(const [key,arr] of buckets.entries()){rows.push({time:new Date(key),priceMWh:arr.reduce((a,b)=>a+b,0)/arr.length})}rows.sort((a,b)=>a.time-b.time);return rows}
function classify(price,min,max){if(max===min)return 'mid';const pct=(price-min)/(max-min);if(pct<=0.33)return 'cheap';if(pct>=0.66)return 'expensive';return 'mid'}
function colorFor(cls){if(cls==='cheap')return getComputedStyle(document.documentElement).getPropertyValue('--cheap').trim();if(cls==='expensive')return getComputedStyle(document.documentElement).getPropertyValue('--expensive').trim();return getComputedStyle(document.documentElement).getPropertyValue('--mid').trim()}
function labelFor(cls){if(cls==='cheap')return 'Conveniente';if(cls==='expensive')return 'Cara';return 'Nella media'}
function showError(message){heroCard.innerHTML=`<div class="state-msg">⚠️ <b style="color:var(--text)">Dati non disponibili</b><br><br>${message}</div>`;chartCard.innerHTML='';cardsEl.innerHTML='';metaEl.textContent='—'}
async function fetchDataset(){const res=await fetch('./data/latest.json?ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('JSON non trovato: controlla che GitHub Actions abbia generato data/latest.json');return await res.json()}
function render(payload){const now=new Date();const zoneLabel=ZONE_LABELS[ZONE];const zoneData=payload.zones?.[ZONE];if(!zoneData||!zoneData.data||!zoneData.data.unix_seconds){throw new Error('Zona non disponibile nel file dati salvato')}const rows=aggregateHourly(zoneData.data);const currentHourKey=new Date(now.getFullYear(),now.getMonth(),now.getDate(),now.getHours()).getTime();const dayRows=rows.filter(r=>sameDay(r.time,now));if(dayRows.length===0)throw new Error('Nessun dato disponibile per oggi');let currentIndex=dayRows.findIndex(r=>r.time.getTime()===currentHourKey);if(currentIndex===-1){currentIndex=dayRows.findIndex(r=>r.time.getTime()>=currentHourKey);if(currentIndex===-1)currentIndex=dayRows.length-1}const nowRow=dayRows[currentIndex];const remaining=dayRows.slice(currentIndex);const dayPrices=dayRows.map(r=>r.priceMWh);const min=Math.min(...dayPrices),max=Math.max(...dayPrices);const nowCls=classify(nowRow.priceMWh,min,max);const nowKwh=nowRow.priceMWh/1000;heroCard.innerHTML=`<div class="hero-top"><div><div class="hour-label">${fullDateLabel(now,now)} · ${hourLabel(nowRow.time)} – ${hourLabel(new Date(nowRow.time.getTime()+3600000))}</div><div class="price-main">${fmtEUR(nowKwh,3)}<sup>€/kWh</sup></div><div class="price-sub">${fmtEUR(nowRow.priceMWh,1)} €/MWh</div></div></div><span class="pill ${nowCls}"><span class="dot" style="background:${colorFor(nowCls)}"></span>${labelFor(nowCls)} rispetto a tutta la giornata</span><div class="advice" id="adviceText"></div>`;let cheapestUpcoming=remaining[0],costliestUpcoming=remaining[0];for(const r of remaining){if(r.priceMWh<cheapestUpcoming.priceMWh)cheapestUpcoming=r;if(r.priceMWh>costliestUpcoming.priceMWh)costliestUpcoming=r}const savingPct=costliestUpcoming.priceMWh>0?Math.round((1-cheapestUpcoming.priceMWh/costliestUpcoming.priceMWh)*100):0;document.getElementById('adviceText').innerHTML=nowCls==='cheap'?`È un buon momento per far partire elettrodomestici a consumo flessibile. L'ora più cara rimasta oggi costerà circa <b>${savingPct}% in più</b>.`:nowCls==='expensive'?`Se puoi, rimanda i consumi flessibili: l'ora più conveniente rimasta oggi sarà alle <b>${hourLabel(cheapestUpcoming.time)}</b>, circa <b>${savingPct}% più economica</b> di adesso.`:`Prezzo nella media. Per risparmiare di più, l'ora più conveniente rimasta oggi è alle <b>${hourLabel(cheapestUpcoming.time)}</b>.`;window._punRows=rows;window._punNow=now;window._payload=payload;renderDayTabs(rows,now);renderDayView(rows,now,window._punView||'today');const generatedAt=payload.generatedAt?new Date(payload.generatedAt):null;const sourceError=payload.lastError?` · ultimo errore sorgente: ${payload.lastError}`:'';metaEl.textContent=generatedAt?`${zoneLabel} · dati salvati alle ${pad(generatedAt.getHours())}:${pad(generatedAt.getMinutes())}${payload.stale?' · dato non aggiornato adesso':''}${sourceError}`:`${zoneLabel} · dati salvati`}
function renderDayTabs(rows,now){const tomorrow=new Date(now);tomorrow.setDate(tomorrow.getDate()+1);const hasTomorrow=rows.some(r=>sameDay(r.time,tomorrow));const view=window._punView||'today';const dayTabs=document.getElementById('dayTabs');dayTabs.innerHTML=`<div class="day-tab ${view==='today'?'active':''}" data-view="today">Oggi</div><div class="day-tab ${view==='tomorrow'?'active':''}" data-view="tomorrow">Domani <span class="badge ${hasTomorrow?'':'unavailable'}">${hasTomorrow?'disponibile':'non ancora'}</span></div>`;dayTabs.querySelectorAll('.day-tab').forEach(tab=>{tab.addEventListener('click',()=>{window._punView=tab.dataset.view;renderDayTabs(window._punRows,window._punNow);renderDayView(window._punRows,window._punNow,window._punView)})})}
function renderDayView(rows,now,view){const targetDate=view==='tomorrow'?(()=>{const t=new Date(now);t.setDate(t.getDate()+1);return t})():now;const targetRows=rows.filter(r=>sameDay(r.time,targetDate));const currentHourKey=new Date(now.getFullYear(),now.getMonth(),now.getDate(),now.getHours()).getTime();if(targetRows.length===0){chartCard.innerHTML=`<div class="empty-tomorrow">I prezzi di domani non sono ancora nel file dati. Riprova dopo il prossimo aggiornamento automatico.</div>`;document.getElementById('tapInfo').textContent='';cardsEl.innerHTML='';return}let currentIndex=view==='today'?targetRows.findIndex(r=>r.time.getTime()===currentHourKey):-1;if(view==='today'&&currentIndex===-1)currentIndex=targetRows.length-1;const prices=targetRows.map(r=>r.priceMWh);const min=Math.min(...prices),max=Math.max(...prices);const barsHtml=targetRows.map((r,i)=>{const cls=classify(r.priceMWh,min,max);const heightPct=max===min?50:8+(r.priceMWh-min)/(max-min)*92;const isNow=i===currentIndex;const isPast=view==='today'&&i<currentIndex;return `<div class="bar-col ${isNow?'now':''} ${isPast?'past':''}" data-hour="${dayTag(r.time,now)} alle ${hourLabel(r.time)}${isPast?' (passata)':''}" data-price="${fmtEUR(r.priceMWh/1000,3)} €/kWh (${fmtEUR(r.priceMWh,1)} €/MWh)">${isNow?'<span class="now-flag"></span>':''}<div class="bar" style="height:${heightPct}%; background:${colorFor(cls)}${isNow?'':';opacity:'+(isPast?'.4':'.85')}"></div></div>`}).join('');const KEY_HOURS=[6,12,18];const axisHtml=targetRows.map((r,i)=>{const isNow=i===currentIndex;const showLabel=isNow||KEY_HOURS.includes(r.time.getHours());return `<span class="${isNow?'now-label':''}">${showLabel?hourLabel(r.time):''}</span>`}).join('');chartCard.innerHTML=`<div class="chart">${barsHtml}</div><div class="axis">${axisHtml}</div>`;const tapInfo=document.getElementById('tapInfo');tapInfo.textContent='tocca una barra per vedere ora e prezzo esatti';chartCard.querySelectorAll('.bar-col').forEach(col=>{col.addEventListener('click',()=>{chartCard.querySelectorAll('.bar-col').forEach(c=>c.classList.remove('selected'));col.classList.add('selected');tapInfo.innerHTML=`<b style="color:var(--text)">${col.dataset.hour}</b> · ${col.dataset.price}`})});let cheapest=targetRows[0],costliest=targetRows[0];for(const r of targetRows){if(r.priceMWh<cheapest.priceMWh)cheapest=r;if(r.priceMWh>costliest.priceMWh)costliest=r}const dayWord=view==='tomorrow'?'domani':'oggi';cardsEl.innerHTML=`<div class="mini-card"><div class="label"><span class="dot" style="background:${colorFor('cheap')}"></span>Più conveniente ${dayWord}</div><div class="time">${hourLabel(cheapest.time)}</div><div class="val">${fmtEUR(cheapest.priceMWh/1000,3)} €/kWh</div></div><div class="mini-card"><div class="label"><span class="dot" style="background:${colorFor('expensive')}"></span>Più cara ${dayWord}</div><div class="time">${hourLabel(costliest.time)}</div><div class="val">${fmtEUR(costliest.priceMWh/1000,3)} €/kWh</div></div>`}
async function load(){heroCard.innerHTML='<div class="skeleton" style="height:90px"></div>';chartCard.innerHTML='<div class="skeleton" style="height:150px"></div>';cardsEl.innerHTML='';try{const payload=await fetchDataset();render(payload)}catch(err){console.error(err);showError(err.message)}}
refreshBtn.addEventListener('click',load);
zoneSelect.addEventListener('change',()=>{ZONE=zoneSelect.value;try{localStorage.setItem('pun_zone',ZONE)}catch(e){}load()});
load();
</script>
</body>
</html>
