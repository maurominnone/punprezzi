name: Aggiorna dati PUN

on:
  workflow_dispatch:
  schedule:
    - cron: '*/6 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update PUN dataset
        run: python scripts/update-pun.py

      - name: Write last run timestamp
        run: date -u +"%Y-%m-%d %H:%M:%S UTC" > data/last_run.txt

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/last_run.txt
          git diff --cached --quiet || git commit -m "Aggiorna dati PUN"
          git push
